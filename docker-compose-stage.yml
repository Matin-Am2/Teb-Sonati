services:
  backend:
    build: . 
    container_name: teb-sonati
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py collectstatic --noinput && exec gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    expose:
      - 8000
    # restart: always
    volumes:
      - ./:/app 
      - static_volume:/app/static

    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db: 
    image: postgres:15
    # restart : always
    environment:
      POSTGRES_DB: ${DB_POSTGRES}
      POSTGRES_USER: ${USER_POSTGRES}
      POSTGRES_PASSWORD: ${PASSWORD_POSTGRES} 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES}"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - .env
      
    volumes:
      - postgres_data:/var/lib/postgresql/data



  redis:
    image: redis:latest
    command: redis-server --appendonly yes
    # restart: always
    
    ports:
      - "6000:6379"
    volumes: 
      - redis_data:/data


  nginx: 
    image: nginx
    container_name: teb_sonati_nginx
    ports:
      - "81:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/home/app/static
    depends_on:
      - redis
      - backend


volumes:
  postgres_data:
  redis_data:
  static_volume:
